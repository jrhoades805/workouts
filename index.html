<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Workouts</title>

<!-- Safari PWA / Add to Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workouts">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D1529">

<!-- App icon (Safari uses this for home screen) -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230D1529'/%3E%3Crect x='20' y='20' width='140' height='140' rx='30' fill='%231E2E5C'/%3E%3Ctext x='90' y='115' text-anchor='middle' font-size='80' font-family='system-ui'%3E💪%3C/text%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0D1529; color: #fff; min-height: 100vh; padding-bottom: max(40px, env(safe-area-inset-bottom)); padding-top: env(safe-area-inset-top); }
  .header { background: linear-gradient(90deg, #0D1529, #1E2E5C); border-bottom: 2px solid #D0AF56; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .header-icon { width: 36px; height: 36px; background: #D0AF56; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header-title { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
  .header-sub { font-size: 11px; color: #7CB4D6; }
  .week-meta { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 8px; flex-wrap: wrap; gap: 8px; }
  .week-title { font-size: 18px; font-weight: 700; }
  .week-sub { font-size: 12px; color: #7CB4D6; margin-top: 2px; }
  .goal-chip { font-size: 11px; color: #D0AF56; background: rgba(208,175,86,0.12); border: 1px solid rgba(208,175,86,0.3); border-radius: 6px; padding: 4px 10px; }
  .stats-row { display: flex; gap: 8px; padding: 0 20px 12px; }
  .stat-chip { flex: 1; text-align: center; padding: 10px 4px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid rgba(124,180,214,0.15); }
  .stat-val { font-size: 20px; font-weight: 700; color: #fff; }
  .stat-lbl { font-size: 10px; color: #7CB4D6; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .progress-bar { height: 3px; background: rgba(255,255,255,0.08); margin: 0 20px 16px; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #27ae60; border-radius: 2px; transition: width 0.3s; }
  .tabs { display: flex; border-bottom: 1px solid rgba(124,180,214,0.2); padding: 0 20px; }
  .tab { background: none; border: none; color: rgba(229,225,225,0.5); font-weight: 600; font-size: 13px; padding: 14px 16px 12px; cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 1px; transition: color 0.2s; }
  .tab.active { color: #D0AF56; border-bottom-color: #D0AF56; }
  .content { padding: 20px; }
  .workout-card { background: linear-gradient(135deg, rgba(30,46,92,0.9), rgba(13,21,41,0.85)); border: 1px solid rgba(124,180,214,0.2); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
  .workout-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .workout-name { font-size: 15px; font-weight: 700; }
  .workout-tag { font-size: 10px; padding: 3px 10px; border-radius: 5px; font-weight: 700; }
  .tag-strength { background: rgba(208,175,86,0.15); color: #D0AF56; border: 1px solid rgba(208,175,86,0.3); }
  .tag-circuit { background: rgba(39,174,96,0.15); color: #2ecc71; border: 1px solid rgba(39,174,96,0.3); }
  .coach-note { font-size: 11px; color: #7CB4D6; margin-bottom: 14px; padding: 8px 12px; background: rgba(124,180,214,0.08); border-radius: 6px; border-left: 2px solid rgba(124,180,214,0.4); font-style: italic; }
  .section-label { font-size: 10px; font-weight: 700; color: #7CB4D6; letter-spacing: 1px; text-transform: uppercase; margin: 14px 0 8px; padding-bottom: 4px; border-bottom: 1px solid rgba(124,180,214,0.15); }
  .sets-header { display: grid; grid-template-columns: 28px 1fr 80px 80px 70px 32px; gap: 6px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 6px; }
  .sets-header span { font-size: 10px; font-weight: 700; color: rgba(124,180,214,0.7); letter-spacing: 0.5px; text-transform: uppercase; }
  .set-row { display: grid; grid-template-columns: 28px 1fr 80px 80px 70px 32px; gap: 6px; align-items: center; margin-bottom: 6px; }
  .set-num { font-size: 12px; font-weight: 700; color: #7CB4D6; text-align: center; }
  .ex-label { font-size: 12px; color: rgba(229,225,225,0.9); }
  .inp { background: rgba(13,21,41,0.8); border: 1px solid rgba(124,180,214,0.25); border-radius: 6px; padding: 5px 8px; font-size: 13px; color: #fff; width: 100%; outline: none; }
  .inp:focus { border-color: rgba(124,180,214,0.6); }
  select.inp { cursor: pointer; }
  .del-btn { background: none; border: none; color: rgba(255,77,77,0.5); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 4px; }
  .del-btn:hover { color: rgba(255,77,77,0.9); }
  .add-set-btn { width: 100%; margin: 8px 0 14px; background: rgba(124,180,214,0.08); border: 1px dashed rgba(124,180,214,0.3); border-radius: 6px; color: #7CB4D6; padding: 7px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .add-set-btn:hover { background: rgba(124,180,214,0.15); }
  .notes-ta { background: rgba(13,21,41,0.8); border: 1px solid rgba(124,180,214,0.25); border-radius: 6px; color: #fff; padding: 8px 10px; font-size: 12px; width: 100%; resize: vertical; min-height: 50px; margin-top: 8px; outline: none; font-family: inherit; }
  .notes-ta:focus { border-color: rgba(124,180,214,0.6); }
  .save-btn { width: 100%; margin-top: 16px; padding: 13px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; background: linear-gradient(90deg, #D0AF56, #e8c94a); color: #0D1529; }
  .save-btn.saved { background: linear-gradient(90deg, #27ae60, #2ecc71); }
  .cardio-block { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; border: 1px solid rgba(124,180,214,0.1); }
  .cardio-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .cardio-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .input-group label { font-size: 10px; color: #7CB4D6; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 3px; }
  .history-card { background: rgba(30,46,92,0.5); border: 1px solid rgba(124,180,214,0.2); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .history-date { font-size: 11px; color: #D0AF56; font-weight: 600; margin-bottom: 6px; }
  .history-ex { margin-bottom: 8px; }
  .history-ex-name { font-size: 12px; font-weight: 600; color: #7CB4D6; margin-bottom: 2px; }
  .history-set { font-size: 11px; color: rgba(229,225,225,0.8); margin-left: 8px; }
  .history-notes { font-size: 11px; color: #7CB4D6; font-style: italic; margin-top: 4px; }
  .empty { text-align: center; color: #7CB4D6; padding: 40px 20px; font-size: 14px; }
  .coach-tip { font-size: 11px; color: rgba(124,180,214,0.8); font-style: italic; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">💪</div>
  <div>
    <div class="header-title">Workout Tracker</div>
    <div class="header-sub">Log · Track · Progress</div>
  </div>
</div>

<div class="week-meta">
  <div>
    <div class="week-title">Week 1 — Full Body Recomp</div>
    <div class="week-sub">3 days · Beginner · Body Recomposition</div>
  </div>
  <div class="goal-chip">Goal: 220 lbs / 25% BF</div>
</div>

<div class="stats-row">
  <div class="stat-chip"><div class="stat-val" id="statSessions">0/3</div><div class="stat-lbl">Sessions</div></div>
  <div class="stat-chip"><div class="stat-val" id="statSets">0</div><div class="stat-lbl">Sets logged</div></div>
  <div class="stat-chip"><div class="stat-val" id="statVol">0</div><div class="stat-lbl">Total lbs</div></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="tabs">
  <button class="tab active" onclick="showDay('A',this)">Day A</button>
  <button class="tab" onclick="showDay('B',this)">Day B</button>
  <button class="tab" onclick="showDay('C',this)">Day C</button>
  <button class="tab" onclick="showDay('history',this)" style="margin-left:auto">History</button>
</div>

<div class="content">
  <div id="panelA"></div>
  <div id="panelB" style="display:none"></div>
  <div id="panelC" style="display:none"></div>
  <div id="panelHistory" style="display:none"></div>
</div>

<script>
const PROGRAMS = {
  A: {
    name: "Day A — Push + Pull + Core",
    tag: "Strength",
    note: "Focus on form over weight. Rest 60–90 sec between sets. Keep shoulder blades back on all pressing movements.",
    exercises: [
      { name: "Smith Machine Squat", tag: "Legs", sets: 3, target: "10–12 reps", tip: "Feet shoulder-width, chest up, sit back into the squat" },
      { name: "Incline DB Press", tag: "Chest", sets: 3, target: "10–12 reps", tip: "45° bench, control the descent — 2 sec down" },
      { name: "Cable Row (Seated)", tag: "Back", sets: 3, target: "10–12 reps", tip: "Squeeze shoulder blades together at the end of each rep" },
      { name: "DB Lateral Raise", tag: "Shoulders", sets: 3, target: "12–15 reps", tip: "Lead with elbows, avoid shrugging — use lighter weight" },
      { name: "Cable Rope Pushdown", tag: "Triceps", sets: 3, target: "12–15 reps", tip: "Elbows stay fixed at sides, spread rope at bottom" },
      { name: "DB Hammer Curl", tag: "Biceps", sets: 3, target: "12–15 reps", tip: "Neutral grip, no swinging — control both directions" },
      { name: "Dead Bug", tag: "Core", sets: 3, target: "8–10/side", tip: "Press lower back into the floor the entire time — breathe out on the way down" },
    ]
  },
  B: {
    name: "Day B — Hinge + Carry + Core",
    tag: "Strength",
    note: "Hip hinge pattern is the focus today. Push your hips back — not down — on deadlifts and RDLs. Brace your core on all carries.",
    exercises: [
      { name: "DB Romanian Deadlift", tag: "Hamstrings", sets: 4, target: "10–12 reps", tip: "Hinge at hips, soft knee bend, dumbbells close to legs the whole way" },
      { name: "DB Goblet Squat", tag: "Quads", sets: 3, target: "12–15 reps", tip: "Hold KB at chest, knees track over toes, sit tall" },
      { name: "DB Row (Single Arm)", tag: "Back", sets: 3, target: "10–12/side", tip: "Row to hip, not shoulder — think elbow to pocket" },
      { name: "Face Pull (Cable)", tag: "Rear Delt", sets: 3, target: "15–20 reps", tip: "Rope to forehead, elbows high — excellent for shoulder health" },
      { name: "Farmer Carry (DB)", tag: "Core/Grip", sets: 3, target: "40 steps", tip: "Tall posture, don't lean to either side — core braced the whole time" },
      { name: "Step-Ups (Plyo Box 20\")", tag: "Legs", sets: 3, target: "10/side", tip: "Full push through the heel at the top — don't push off the back foot" },
      { name: "Plank", tag: "Core", sets: 3, target: "30–45 sec", tip: "Squeeze glutes and abs simultaneously — don't let hips sag or pike" },
    ]
  },
  C: {
    name: "Day C — Total Body Circuit + Core",
    tag: "Circuit",
    note: "Move with purpose. 40 sec on / 20 sec rest format. Log reps completed each round. Aim for 3 rounds total.",
    exercises: [
      { name: "KB Swing", tag: "Full Body", sets: 3, target: "15 reps", tip: "Hip snap drives the swing, not your arms — hinge don't squat" },
      { name: "TRX Row", tag: "Back", sets: 3, target: "12–15 reps", tip: "Body straight, pull chest to handles — easier = walk feet forward" },
      { name: "DB Flat Press", tag: "Chest", sets: 3, target: "12 reps", tip: "Controlled — 2 sec down, press up with intention" },
      { name: "DB Walking Lunge", tag: "Legs", sets: 3, target: "10/side", tip: "Front knee stays over ankle — step through, don't bounce" },
      { name: "Battle Rope Slams", tag: "Cardio/Core", sets: 3, target: "20 slams", tip: "Big hip hinge, slam down with full power — this is conditioning" },
      { name: "Med Ball Slam (8 lb)", tag: "Core/Power", sets: 3, target: "10 reps", tip: "Reach high overhead, slam with intent — fast reset and repeat" },
      { name: "BOSU Bird-Dog", tag: "Core", sets: 3, target: "8/side", tip: "Opposite arm and leg, hold 2 sec at top — stay level, don't rotate" },
    ]
  }
};

let sessionData = { A: {}, B: {}, C: {} };
let savedSessions = [];
try { savedSessions = JSON.parse(localStorage.getItem('jasonWorkoutsW1') || '[]'); } catch(e) {}

function initDay(day) {
  PROGRAMS[day].exercises.forEach((ex, ei) => {
    if (!sessionData[day][ei]) {
      sessionData[day][ei] = Array.from({length: ex.sets}, () => ({ weight: '', reps: '', rpe: '' }));
    }
  });
}

function renderDay(day) {
  initDay(day);
  const prog = PROGRAMS[day];
  const isCircuit = prog.tag === 'Circuit';
  let html = `
    <div class="workout-card">
      <div class="workout-meta">
        <div class="workout-name">${prog.name}</div>
        <span class="workout-tag ${isCircuit ? 'tag-circuit' : 'tag-strength'}">${prog.tag}</span>
      </div>
      <div class="coach-note">${prog.note}</div>`;

  prog.exercises.forEach((ex, ei) => {
    html += `<div class="section-label">${ex.name} — ${ex.target} · ${ex.tag}</div>`;
    html += `<div class="coach-tip">💡 ${ex.tip}</div>`;
    html += `<div class="sets-header"><span>#</span><span>Exercise</span><span>Weight (lbs)</span><span>Reps</span><span>RPE</span><span></span></div>`;
    sessionData[day][ei].forEach((set, si) => {
      html += `<div class="set-row">
        <div class="set-num">${si+1}</div>
        <div class="ex-label" style="font-size:11px;">${ex.name}</div>
        <input class="inp" type="number" placeholder="lbs" value="${set.weight}" oninput="updateSet('${day}',${ei},${si},'weight',this.value)">
        <input class="inp" type="number" placeholder="reps" value="${set.reps}" oninput="updateSet('${day}',${ei},${si},'reps',this.value)">
        <select class="inp" onchange="updateSet('${day}',${ei},${si},'rpe',this.value)">
          <option value="">RPE</option>
          ${[6,7,7.5,8,8.5,9,9.5,10].map(r=>`<option value="${r}"${set.rpe==r?' selected':''}>${r}</option>`).join('')}
        </select>
        <button class="del-btn" onclick="removeSet('${day}',${ei},${si})">×</button>
      </div>`;
    });
    html += `<button class="add-set-btn" onclick="addSet('${day}',${ei})">+ add set</button>`;
  });

  if (isCircuit) {
    html += `<div class="section-label">Cardio finisher</div>
    <div class="cardio-block">
      <div class="cardio-title">HIT Rower — 10 min steady state</div>
      <div class="cardio-inputs">
        <div class="input-group"><label>Distance (m)</label><input class="inp" id="cardioDist${day}" type="number" placeholder="e.g. 2000" value="${sessionData[day].cardioDist||''}"></div>
        <div class="input-group"><label>Avg pace /500m</label><input class="inp" id="cardioPace${day}" type="text" placeholder="e.g. 2:30" value="${sessionData[day].cardioPace||''}"></div>
      </div>
    </div>`;
  }

  html += `<div class="section-label">Session notes</div>
    <textarea class="notes-ta" id="notes${day}" placeholder="How did it feel? Energy level, soreness, anything to note for next time...">${sessionData[day].notes||''}</textarea>
    <button class="save-btn" id="saveBtn${day}" onclick="saveDay('${day}')">Save Day ${day}</button>
  </div>`;

  document.getElementById('panel' + day).innerHTML = html;
}

function updateSet(day, ei, si, field, val) {
  sessionData[day][ei][si][field] = val;
  updateStats();
}

function addSet(day, ei) {
  sessionData[day][ei].push({ weight: '', reps: '', rpe: '' });
  renderDay(day);
}

function removeSet(day, ei, si) {
  if (sessionData[day][ei].length > 1) {
    sessionData[day][ei].splice(si, 1);
    renderDay(day);
  }
}

function showDay(day, btn) {
  ['A','B','C','history'].forEach(d => {
    document.getElementById('panel' + (d==='history'?'History':d)).style.display = 'none';
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (day === 'history') {
    document.getElementById('panelHistory').style.display = '';
    renderHistory();
  } else {
    document.getElementById('panel' + day).style.display = '';
  }
}

function updateStats() {
  let sets = 0, vol = 0;
  ['A','B','C'].forEach(d => {
    Object.values(sessionData[d]).forEach(arr => {
      if (!Array.isArray(arr)) return;
      arr.forEach(s => {
        if (s.reps) sets++;
        if (s.weight && s.reps) vol += parseFloat(s.weight) * parseFloat(s.reps);
      });
    });
  });
  document.getElementById('statSets').textContent = sets;
  document.getElementById('statVol').textContent = Math.round(vol).toLocaleString();
}

function saveDay(day) {
  sessionData[day].notes = document.getElementById('notes' + day)?.value || '';
  const distEl = document.getElementById('cardioDist' + day);
  const paceEl = document.getElementById('cardioPace' + day);
  if (distEl) sessionData[day].cardioDist = distEl.value;
  if (paceEl) sessionData[day].cardioPace = paceEl.value;

  const entry = {
    day: 'Day ' + day,
    date: new Date().toLocaleDateString(),
    exercises: PROGRAMS[day].exercises.map((ex, ei) => ({
      name: ex.name,
      sets: sessionData[day][ei]
    })),
    notes: sessionData[day].notes,
    cardioDist: sessionData[day].cardioDist,
    cardioPace: sessionData[day].cardioPace
  };
  savedSessions.push(entry);
  try { localStorage.setItem('jasonWorkoutsW1', JSON.stringify(savedSessions)); } catch(e) {}

  const btn = document.getElementById('saveBtn' + day);
  btn.textContent = '✓ Day ' + day + ' saved!';
  btn.classList.add('saved');
  setTimeout(() => {
    btn.textContent = 'Save Day ' + day;
    btn.classList.remove('saved');
  }, 2500);

  const completedDays = new Set(savedSessions.map(s => s.day)).size;
  document.getElementById('statSessions').textContent = completedDays + '/3';
  document.getElementById('progressFill').style.width = Math.round((completedDays / 3) * 100) + '%';
}

function renderHistory() {
  const el = document.getElementById('panelHistory');
  if (!savedSessions.length) {
    el.innerHTML = '<div class="empty">No sessions saved yet.<br>Complete your first workout to see history here.</div>';
    return;
  }
  el.innerHTML = [...savedSessions].reverse().map(s => `
    <div class="history-card">
      <div class="history-date">${s.date} · ${s.day}</div>
      ${s.exercises.map(ex => {
        const relevantSets = ex.sets ? ex.sets.filter(st => st.reps || st.weight) : [];
        if (!relevantSets.length) return '';
        return `<div class="history-ex">
          <div class="history-ex-name">${ex.name}</div>
          ${relevantSets.map((st, i) => `<div class="history-set">Set ${i+1}: ${st.weight||'—'} lbs × ${st.reps||'—'} reps${st.rpe ? ' · RPE '+st.rpe : ''}</div>`).join('')}
        </div>`;
      }).join('')}
      ${s.cardioDist ? `<div class="history-set" style="margin-top:4px;">🚣 Rower: ${s.cardioDist}m${s.cardioPace ? ' · ' + s.cardioPace + '/500m' : ''}</div>` : ''}
      ${s.notes ? `<div class="history-notes">📝 ${s.notes}</div>` : ''}
    </div>
  `).join('');
}

renderDay('A');
renderDay('B');
renderDay('C');
updateStats();
</script>
</body>
</html>
